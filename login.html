<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg" style="width: 350px;">
  <h2 class="text-center mb-3">Login</h2>

  <!-- Added id and removed action/method -->
  <form id="loginForm">
    <input type="email" class="form-control mb-3" id="email" placeholder="Email" required />
    <input type="password" class="form-control mb-3" id="password" placeholder="Password" required />
    <button type="submit" class="btn btn-success w-100">Login</button>
  </form>

  <p class="mt-3 text-center">
    Don't have an account? 
    <a href="/register-page">Register</a>
  </p>

  <p id="message" class="text-danger text-center"></p>
</div>

<script>

    console.log("JS loaded");
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        console.log("Email:", email);
        console.log("Password:", password);

        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            if (data.role === "admin") {
                window.location.href = "/admin_dashboard";
            } else {
                window.location.href = "/dashboard";
            }
        } else {
            document.getElementById("message").innerText = data.error;
        }
    });

    if(data.role === "admin"){
        window.location.href = "/admin_dashboard";
    } else {
        window.location.href = "/dashboard";
    }
    </script>

</body>
</html>
